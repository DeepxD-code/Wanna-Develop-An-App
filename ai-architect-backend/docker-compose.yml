version: "3.9"

# ── AI Architect — Local Development Services ──
# Run: docker compose up -d
# Starts Redis + PostgreSQL for local development.

services:

  redis:
    image: redis:7-alpine
    container_name: ai-architect-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: ai-architect-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       ai_architect
      POSTGRES_USER:     ai_architect
      POSTGRES_PASSWORD: ai_architect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_architect"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
